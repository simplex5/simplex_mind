[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = ["venv", "database", "subconscious"]

[tool.ruff.lint]
# E/F: pycodestyle errors + pyflakes. Keep the bar practical for a CLI toolkit:
# no import-order or docstring crusades, just real defects and dead code.
select = ["E4", "E7", "E9", "F"]
