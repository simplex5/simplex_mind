# projects.yaml — Project Registry
# Maps project names to their paths and configuration.
# simplex_mind reads this at session start to load the active project's instructions.
# Each project has its own ticket database at <path>/database/tickets.db

projects:
  cornucopia2:
    path: ~/projects/cornucopia2
    ref_file: CLAUDE.md.ref    # project-specific instructions (loaded after simplex_mind's CLAUDE.md)
    ticket_prefix: CORN
    active: false
  app_test2:
    path: ~/projects/app_test2
    ref_file: CLAUDE.md.ref
    ticket_prefix: SHOP
    active: false
  simplex_mind:
    path: ~/projects/simplex_mind
    ticket_prefix: SIMP
    active: true
